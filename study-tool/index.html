<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Casos de Ciberseguridad - Herramienta de estudio</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2328345a'/%3E%3Cpath d='M8 10h16v12H8zM11 14h10M11 18h6' stroke='white' stroke-width='2' fill='none'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <a class="skip-link" href="#caseDetail">Saltar al caso</a>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <p class="eyebrow">Modulo 2 - Modulo 3</p>
          <h1>Expediente de casos</h1>
        </div>
        <div class="topbar-meta" aria-label="Resumen">
          <span><strong id="caseCount">0</strong> expedientes</span>
          <span><strong id="sourceCount">0</strong> fuentes</span>
        </div>
      </header>

      <aside class="case-rail" aria-label="Casos disponibles">
        <div class="toolbar">
          <label class="search-field">
            <span>Buscar</span>
            <input id="searchInput" type="search" autocomplete="off" placeholder="IAM, ransomware, LLM">
          </label>
          <div class="filter-row" id="topicFilters" aria-label="Filtros por tema"></div>
        </div>
        <nav class="case-list" id="caseList"></nav>
      </aside>

      <main id="caseDetail" class="case-detail" tabindex="-1"></main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
